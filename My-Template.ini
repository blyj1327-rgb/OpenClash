[custom]

;OpenClash 自定义模板（AI + 美股 + YouTube 稳定版）
;适合：
;中国大陆网络环境
;香港优先金融访问
;美国优先 AI
;YouTube 香港优先
;Apple 服务尽量直连


;节点地区分组

custom_proxy_group=🇭🇰 香港节点`select`(HK|香港|Hong Kong|HKBN|HGC)

custom_proxy_group=🇺🇸 美国节点`select`(US|美国|USA|America|Los|San Jose|Silicon|New York)

;主策略组

custom_proxy_group=🚀 节点选择`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]DIRECT


;AI 服务（美国优先）

custom_proxy_group=🤖 AI服务`select`[]🇺🇸 美国节点`[]🚀 节点选择


;金融专线（香港优先）

custom_proxy_group=🏦 金融专线`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]DIRECT

custom_proxy_group=💰 美股交易`select`[]🏦 金融专线`[]DIRECT


;YouTube（香港优先）

custom_proxy_group=📺 YouTube`select`[]🇭🇰 香港节点`[]🚀 节点选择


;Apple 服务

custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🇭🇰 香港节点`[]🚀 节点选择


;广告拦截

custom_proxy_group=🛡️ 广告拦截`select`[]REJECT`[]DIRECT


;国内直连

custom_proxy_group=🎯 全球直连`select`[]DIRECT

;漏网之鱼

custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT


;规则集

;Apple
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list

;YouTube
ruleset=📺 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/YouTube.list

;AI 服务
ruleset=🤖 AI服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

;美股 / 金融
ruleset=💰 美股交易,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

;广告拦截
ruleset=🛡️ 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list

;国内域名直连
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list

;中国 IP 直连
ruleset=🎯 全球直连,[]GEOIP,CN

;最终规则
ruleset=🐟 漏网之鱼,[]FINAL


;启用规则生成

enable_rule_generator=true

overwrite_original_rules=true
