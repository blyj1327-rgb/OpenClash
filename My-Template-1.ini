custom_proxy_group=🎯 小众直连`select`[]DIRECT



;节点地区分组
custom_proxy_group=🇭🇰 香港节点`select`(港|HK|Hong Kong|香港)

custom_proxy_group=🇺🇸 美国节点`select`(美|US|USA|United States|美国)

custom_proxy_group=🇹🇼 台湾节点`select`(台|TW|Taiwan|台湾)

custom_proxy_group=🇯🇵 日本节点`select`(日|JP|Japan|日本)

custom_proxy_group=🇸🇬 新加坡节点`select`(新加坡|SG|Singapore)


