[custom]
;解决DNS泄露，简单分组，适合稳定美股交易

;策略组
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🏦 金融专线`select`香港 02`香港 08`美国 05
custom_proxy_group=🌍 Google`select`[]🇺🇸 美国节点`[]🇭🇰 香港节点
custom_proxy_group=🤖 AI服务`select`[]🇺🇸 美国节点`[]🇭🇰 香港节点
custom_proxy_group=🍎 Apple`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=🇨🇳 微软中国`select`[]DIRECT`[]🇺🇸 美国节点`[]🇭🇰 香港节点

;节点地区分组
custom_proxy_group=🇭🇰 香港节点`select`(港|HK|Hong Kong|香港)
custom_proxy_group=🇺🇸 美国节点`select`(美|US|USA|United States|美国)

;规则集
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list

ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=REJECT,https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/AWAvenue-Ads-Rule-Clash.yaml
ruleset=REJECT,https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml

ruleset=🏦 金融专线,https://raw.githubusercontent.com/blyj1327-rgb/OpenClash/refs/heads/main/Finance.list
ruleset=🤖 AI服务,https://raw.githubusercontent.com/blyj1327-rgb/OpenClash/refs/heads/main/AI.list
ruleset=🌍 Google,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=🌍 Google,[]DOMAIN-SUFFIX,xn--ngstr-lra8j.com
ruleset=🌍 Google,[]DOMAIN-SUFFIX,services.googleapis.cn
ruleset=🍎 Apple,https://raw.githubusercontent.com/blyj1327-rgb/OpenClash/refs/heads/main/Apple.list
ruleset=🇨🇳 微软中国,https://raw.githubusercontent.com/blyj1327-rgb/OpenClash/refs/heads/main/Microsoft.list
ruleset=🇺🇸 美国节点,https://raw.githubusercontent.com/blyj1327-rgb/OpenClash/refs/heads/main/Adobe.list

ruleset=DIRECT,https://raw.githubusercontent.com/blyj1327-rgb/OpenClash/refs/heads/main/DirectDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaMedia.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=DIRECT,[]GEOIP,CN,no-resolve
ruleset=♻️ 自动选择,[]FINAL

enable_rule_generator=true
overwrite_original_rules=true    
