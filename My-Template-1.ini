[custom]
;解决DNS泄露，简单分组，适合稳定美股交易

;策略组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]DIRECT`.*

custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🏦 金融专线`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]DIRECT

custom_proxy_group=🌍 Google`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]🚀 节点选择

custom_proxy_group=🤖 AI服务`select`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🚀 节点选择

custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🇭🇰 香港节点`[]🇺🇸 美国节点

custom_proxy_group=🎯 小众直连`select`[]DIRECT



;节点地区分组
custom_proxy_group=🇭🇰 香港节点`select`(港|HK|Hong Kong|香港)

custom_proxy_group=🇺🇸 美国节点`select`(美|US|USA|United States|美国)

custom_proxy_group=🇹🇼 台湾节点`select`(台|TW|Taiwan|台湾)

custom_proxy_group=🇯🇵 日本节点`select`(日|JP|Japan|日本)

custom_proxy_group=🇸🇬 新加坡节点`select`(新加坡|SG|Singapore)


