;解决DNS泄露，简单分组，适合稳定美股交易

;策略组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]DIRECT`.*

custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🏦 金融专线`select`[]🇭🇰 香港节点`[]🇺🇸 美国节点`[]DIRECT

